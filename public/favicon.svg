<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Screen/Monitor icon -->
  <g filter="url(#glow)">
    <rect x="6" y="4" width="20" height="14" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
    <rect x="7" y="5" width="18" height="12" rx="1.5" fill="rgba(255,255,255,0.1)"/>
    <!-- Recording dot -->
    <circle cx="22" cy="8" r="3" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Sound waves -->
    <path d="M10 10 Q8 8 8 6" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M13 10 Q11 6 11 4" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M16 10 Q14 4 14 2" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>
  <!-- Stand -->
  <rect x="14" y="18" width="4" height="3" rx="1" fill="white" opacity="0.9"/>
  <rect x="11" y="21" width="10" height="2" rx="1" fill="white" opacity="0.9"/>
</svg>