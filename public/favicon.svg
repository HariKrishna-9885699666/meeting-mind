<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="18" y="30" width="48" height="40" rx="6" fill="white" opacity="0.95"/>
  <rect x="18" y="30" width="48" height="40" rx="6" fill="none" stroke="white" stroke-width="2"/>
  <!-- Camera lens -->
  <circle cx="42" cy="50" r="12" fill="#1e293b"/>
  <circle cx="42" cy="50" r="8" fill="#0f172a"/>
  <circle cx="44" cy="48" r="3" fill="white" opacity="0.3"/>
  <!-- Flash -->
  <circle cx="60" cy="36" r="3" fill="white" opacity="0.6"/>
  <!-- Record dot -->
  <circle cx="42" cy="88" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
